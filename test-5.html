<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kripton Light Beam Layout</title>

<style>
:root {
  --bg:#0b0b0c;
  --card:#141416;
  --text:#e6e6e6;
  --muted:#8a8a8a;
  --accent:#d6a85f;
}

body {
  margin:0;
  background:var(--bg);
  font-family:Segoe UI;
  color:var(--text);
}

/* ---------------- HERO BEAM ---------------- */

.hero {
  position:relative;
  height:80vh;
  overflow:hidden;
}

/* beam lines */
.beam {
  position:absolute;
  width:2px;
  height:120%;
  background:linear-gradient(to bottom, transparent, var(--accent), transparent);
  opacity:.3;
}

.beam.left { left:30%; transform:rotate(25deg); }
.beam.right { right:30%; transform:rotate(-25deg); }

/* hero card */
.hero-card {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:320px;
  background:var(--card);
  padding:20px;
  border-radius:20px;
  text-align:center;
}

.hero-card img {
  width:100%;
  height:200px;
  object-fit:contain;
}

/* orbit cards */
.orbit {
  position:absolute;
  width:180px;
}

.orbit img {
  width:100%;
  height:120px;
  object-fit:contain;
}

/* manual positions */
.o1 { top:10%; left:20%; }
.o2 { top:20%; right:20%; }
.o3 { bottom:15%; left:25%; }
.o4 { bottom:10%; right:25%; }

/* ---------------- GRID ---------------- */

.wrapper {
  padding:60px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(6,1fr);
  grid-auto-rows:150px;
  gap:16px;
}

.card {
  background:var(--card);
  border-radius:16px;
  padding:16px;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:flex-end;
  transition:.4s;
}

.card:hover {
  transform:translateY(-8px);
}

/* IMAGE */
.card img {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
  opacity:.85;
}

/* CONTENT */
.content {
  position:relative;
  z-index:2;
}

.name { font-size:16px; }
.code { font-size:12px; color:var(--muted); }

.specs span {
  font-size:11px;
  background:rgba(255,255,255,0.08);
  padding:4px 8px;
  border-radius:20px;
  margin-right:5px;
}

/* sizes */
.wide { grid-column:span 3; }
.medium { grid-column:span 2; }
.small { grid-column:span 2; }

.tall { grid-row:span 2; }
.big { grid-column:span 3; grid-row:span 2; }

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">

  <div class="beam left"></div>
  <div class="beam right"></div>

  <!-- MAIN PRODUCT -->
  <div class="hero-card" id="heroCard"></div>

  <!-- orbit products -->
  <div class="orbit o1" id="o1"></div>
  <div class="orbit o2" id="o2"></div>
  <div class="orbit o3" id="o3"></div>
  <div class="orbit o4" id="o4"></div>

</div>

<!-- GRID -->
<div class="wrapper">
  <div class="grid" id="grid"></div>
</div>

<script>

/* DATA */
const products = [
{name:"Jazz",code:"KR-SIG-J12",specs:["12W","3000K"],layout:"wide",img:"images/KRIPTON PRODUCT IMAGE/Render/SIGNATURE SERIES/JAZZ WHITE.png"},
{name:"Sora",code:"KR-SIG-S07",specs:["7W","4000K"],layout:"wide",img:"images/KRIPTON PRODUCT IMAGE/Render/SIGNATURE SERIES/SORA 7W WHITE.png"},
{name:"Colt",code:"KR-SIG-C18",specs:["18W"],layout:"tall",img:"images/KRIPTON PRODUCT IMAGE/Render/SIGNATURE SERIES/COLT 18W WHITE.png"},
{name:"Lumera",code:"KR-SIG-L12",specs:["12W"],layout:"tall",img:"images/KRIPTON PRODUCT IMAGE/Render/SIGNATURE SERIES/LUMERA WHITE.png"},
{name:"Evan",code:"KR-SIG-E12",specs:["12W","3000K","CRI 90+"],layout:"big",img:"images/KRIPTON PRODUCT IMAGE/Render/SIGNATURE SERIES/EVAN 12W WHITE.png"},
{name:"Glint",code:"KR-SIG-G12",specs:["12W"],layout:"small",img:"images/KRIPTON PRODUCT IMAGE/Render/SIGNATURE SERIES/GLINT 12W BLACK.png"},
{name:"Dusk",code:"KR-SIG-D12",specs:["12W"],layout:"medium",img:"images/KRIPTON PRODUCT IMAGE/Render/SIGNATURE SERIES/DUSK 12W WHITE.png"},
{name:"Pure",code:"KR-SIG-P12",specs:["12W"],layout:"small",img:"images/KRIPTON PRODUCT IMAGE/Render/SIGNATURE SERIES/PURE WHITE.png"},
{name:"Parox",code:"KR-SIG-PX12",specs:["12W"],layout:"medium",img:"images/KRIPTON PRODUCT IMAGE/Render/SIGNATURE SERIES/PAROX 12W WHITE.png"},
{name:"Titan",code:"KR-SIG-T12",specs:["12W"],layout:"wide",img:"images/KRIPTON PRODUCT IMAGE/Render/SIGNATURE SERIES/TITAN ROUND WHITE.png"},
{name:"Ray",code:"KR-SIG-R9",specs:["9W"],layout:"medium",img:"images/KRIPTON PRODUCT IMAGE/Render/SIGNATURE SERIES/RAY 9W WHITE.png"},
{name:"Zola",code:"KR-SIG-Z7",specs:["7W"],layout:"small",img:"images/KRIPTON PRODUCT IMAGE/Render/SIGNATURE SERIES/ZOLA_7W WHITE.png"}
];

/* HERO SETUP */
const hero = products[4]; // Evan
document.getElementById("heroCard").innerHTML = `
  <img src="${hero.img}">
  <div class="name">${hero.name}</div>
  <div class="code">${hero.code}</div>
`;

/* orbit items */
["o1","o2","o3","o4"].forEach((id,i)=>{
  const p = products[i];
  document.getElementById(id).innerHTML = `
    <img src="${p.img}">
    <div>${p.name}</div>
  `;
});

/* GRID RENDER */
const grid = document.getElementById("grid");

products.slice(5).forEach(p => {

  const card = document.createElement("div");
  card.className = `card ${p.layout}`;

  card.innerHTML = `
    <img src="${p.img}">
    <div class="content">
      <div class="name">${p.name}</div>
      <div class="code">${p.code}</div>
      <div class="specs">
        ${p.specs.map(s=>`<span>${s}</span>`).join("")}
      </div>
    </div>
  `;

  grid.appendChild(card);
});

</script>

</body>
</html>
