<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kripton Dynamic Layout</title>

<style>
:root {
  --bg:#0b0b0c;
  --card:#141416;
  --text:#e6e6e6;
  --muted:#8a8a8a;
  --accent:#d6a85f;
}

body {
  margin:0;
  background:var(--bg);
  font-family:Segoe UI;
  color:var(--text);
}

.wrapper {
  padding:60px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(6, 1fr);
  grid-auto-rows: 140px;
  gap:16px;
}

/* CARD */
.card {
  background:var(--card);
  border-radius:16px;
  padding:16px;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:flex-end;
  transition:.4s;
}

.card:hover {
  transform:translateY(-8px);
}

/* IMAGE */
.img {
  position:absolute;
  inset:0;
  opacity:.85;
}

.img img {
  width:100%;
  height:100%;
  object-fit:contain;
  padding:12px;
}

/* CONTENT */
.content { position:relative; z-index:2; }

.name { font-size:16px; }
.code { font-size:12px; color:var(--muted); }

.specs span {
  font-size:11px;
  background:rgba(255,255,255,0.08);
  padding:4px 8px;
  border-radius:20px;
  margin-right:5px;
}

/* SIZE CLASSES */
.wide { grid-column: span 3; }
.medium { grid-column: span 2; }
.small { grid-column: span 2; }

.tall { grid-row: span 2; }
.big { grid-column: span 3; grid-row: span 2; }

</style>
</head>

<body>

<div class="wrapper">
  <div class="grid" id="grid"></div>
</div>

<script>

/* PRODUCT DATA */
const products = [
  {name:"Jazz",   code:"KR-SIG-J12", specs:["12W","3000K"],        layout:"wide",   img:"images/KRIPTON PRODUCT IMAGE/Render/SIGNATURE SERIES/JAZZ WHITE.png"},
  {name:"Sora",   code:"KR-SIG-S07", specs:["7W","4000K"],         layout:"wide",   img:"images/KRIPTON PRODUCT IMAGE/Render/SIGNATURE SERIES/SORA 7W WHITE.png"},
  {name:"Colt",   code:"KR-SIG-C18", specs:["18W"],                layout:"tall",   img:"images/KRIPTON PRODUCT IMAGE/Render/SIGNATURE SERIES/COLT 18W WHITE.png"},
  {name:"Lumera", code:"KR-SIG-L12", specs:["12W"],                layout:"tall",   img:"images/KRIPTON PRODUCT IMAGE/Render/SIGNATURE SERIES/LUMERA WHITE.png"},
  {name:"Evan",   code:"KR-SIG-E12", specs:["12W","3000K","CRI 90+"], layout:"big", img:"images/KRIPTON PRODUCT IMAGE/Render/SIGNATURE SERIES/EVAN 12W WHITE.png"},
  {name:"Glint",  code:"KR-SIG-G12", specs:["12W"],                layout:"small",  img:"images/KRIPTON PRODUCT IMAGE/Render/SIGNATURE SERIES/GLINT 12W BLACK.png"},
  {name:"Dusk",   code:"KR-SIG-D12", specs:["12W"],                layout:"medium", img:"images/KRIPTON PRODUCT IMAGE/Render/SIGNATURE SERIES/DUSK 12W WHITE.png"},
  {name:"Pure",   code:"KR-SIG-P12", specs:["12W"],                layout:"small",  img:"images/KRIPTON PRODUCT IMAGE/Render/SIGNATURE SERIES/PURE WHITE.png"},
  {name:"Parox",  code:"KR-SIG-PX12",specs:["12W"],                layout:"medium", img:"images/KRIPTON PRODUCT IMAGE/Render/SIGNATURE SERIES/PAROX 12W WHITE.png"},
  {name:"Titan",  code:"KR-SIG-T12", specs:["12W"],                layout:"wide",   img:"images/KRIPTON PRODUCT IMAGE/Render/SIGNATURE SERIES/TITAN ROUND WHITE.png"},
  {name:"Ray",    code:"KR-SIG-R9",  specs:["9W"],                 layout:"medium", img:"images/KRIPTON PRODUCT IMAGE/Render/SIGNATURE SERIES/RAY 9W WHITE.png"},
  {name:"Zola",   code:"KR-SIG-Z7",  specs:["7W"],                 layout:"small",  img:"images/KRIPTON PRODUCT IMAGE/Render/SIGNATURE SERIES/ZOLA_7W WHITE.png"}
];

/* RENDER FUNCTION */
const grid = document.getElementById("grid");

products.forEach(p => {

  const card = document.createElement("div");
  card.className = `card ${p.layout}`;

  card.innerHTML = `
    <div class="img"><img src="${p.img}" alt="${p.name}" loading="lazy"></div>
    <div class="content">
      <div class="name">${p.name}</div>
      <div class="code">${p.code}</div>
      <div class="specs">
        ${p.specs.map(s => `<span>${s}</span>`).join("")}
      </div>
    </div>
  `;

  grid.appendChild(card);
});

</script>

</body>
</html>
