<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KRIPTON Cards Grid</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #000;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 30px;
    padding: 60px;
}

/* CARD */
.card {
    height: 420px;
    perspective: 1200px;
}

/* INNER */
.card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transition: transform 0.8s;
    transform-style: preserve-3d;
}

.card.flip .card-inner {
    transform: rotateY(180deg);
}

/* FRONT + BACK */
.card-front,
.card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 18px;
    backdrop-filter: blur(14px);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 0 20px rgba(0, 140, 255, 0.15);
    padding: 20px;

    display: flex;
    flex-direction: column;
    justify-content: space-between;

    backface-visibility: hidden;
}

/* BACK ROTATE */
.card-back {
    transform: rotateY(180deg);
}

/* PRODUCT IMAGE */
.product-img {
    text-align: center;
}
.product-img img {
    width: 120px;
    filter: drop-shadow(0 0 15px rgba(255,255,200,0.6));
}

/* TEXT */
.title {
    font-size: 18px;
    font-weight: 600;
    margin-top: 10px;
}

.subtitle {
    font-size: 12px;
    opacity: 0.7;
}

/* SPECS */
.specs {
    margin-top: 10px;
    font-size: 13px;
}

.spec-row {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* FIXED BUTTON */
.btn-wrap {
    margin-top: auto;
}

.flip-btn {
    width: 100%;
    padding: 10px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    background: linear-gradient(45deg, #3b82f6, #8b5cf6);
    color: #fff;
    font-size: 13px;
    transition: 0.3s;
}

.flip-btn:hover {
    transform: scale(1.05);
}

/* GLOW BORDER */
.card::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 20px;
    background: linear-gradient(45deg, #3b82f6, #8b5cf6);
    filter: blur(10px);
    opacity: 0.25;
    z-index: -1;
}
</style>
</head>

<body>

<div class="grid">

<!-- REPEAT CARD -->
<script>
const products = Array.from({length: 12}, (_, i) => ({
    name: `KR-DL-${i+1}W`,
    lumens: 1000 + i * 100
}));

document.write(products.map((p, i) => `
<div class="card" onclick="flipCard(this)">
    <div class="card-inner">

        <!-- FRONT -->
        <div class="card-front">
            <div>
                <div class="product-img">
                    <img src="images/KRIPTON PRODUCT IMAGE/Render/CLASSIC SERIES/ANCHOR WHITE.png">
                </div>
                <div class="title">${p.name}</div>
                <div class="subtitle">Precision Lighting</div>
            </div>

            <div class="btn-wrap">
                <button class="flip-btn">View Specs</button>
            </div>
        </div>

        <!-- BACK -->
        <div class="card-back">
            <div>
                <div class="title">Specifications</div>

                <div class="specs">
                    <div class="spec-row"><span>Watt</span><span>${i+6}W</span></div>
                    <div class="spec-row"><span>Lumens</span><span>${p.lumens}lm</span></div>
                    <div class="spec-row"><span>CCT</span><span>3000K</span></div>
                    <div class="spec-row"><span>CRI</span><span>>90</span></div>
                    <div class="spec-row"><span>IP</span><span>IP65</span></div>
                </div>
            </div>

            <div class="btn-wrap">
                <button class="flip-btn">Back</button>
            </div>
        </div>

    </div>
</div>
`).join(''));
</script>

</div>

<script>
function flipCard(el) {
    el.classList.toggle("flip");
}
</script>

</body>
</html>
